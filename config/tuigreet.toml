[display]
show_time = true
greeting = "Welcome to NixOS!"
align_greeting = "center"
issue = false

[layout]
width = 60
window_padding = 2
container_padding = 1
prompt_padding = 1

[layout.widgets]
time_position = "top"      # "top", "bottom", "default", "hidden"
status_position = "bottom" # "top", "bottom", "default", "hidden"

[remember]
username = true
session = false
user_session = true

[user_menu]
enabled = true
min_uid = 1000
max_uid = 30000

[secret]
mode = "characters" # "hidden" or "characters"
characters = "*"

[keybindings]
command = 2  # F2
sessions = 3 # F3
power = 12   # F12

[power]
use_setsid = false
