"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$kubernetes\
$directory\
$git_branch\
$git_commit\
$git_status\
$fill\
$docker_context\
$lua\
$rust\
$bun\
$deno\
$nodejs\
$golang\
$python\
$php\
$memory_usage\
$aws\
$azure\
$nix_shell\
$cmd_duration\
$line_break\
$jobs\
$container\
$character\
"""
palette = 'colors'
add_newline = true

[palettes.colors]
color1 = '{{colors.primary_fixed_dim.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface_variant.default.hex}}'
color4 = '{{colors.surface_container.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.surface_dim.default.hex}}'
color7 = '{{colors.surface.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

[fill]
symbol = ' '

[aws]
format = 'on [$symbol(\($region\) )]($style)'
style = "blue"
symbol = " "

[aws.region_aliases]
sa-east-1 = "sa"
us-east-1 = "us"

[azure]
symbol = "  "

[bun]
symbol = "  "

[character]
success_symbol = "[🞈](color9 bold)"
error_symbol = "[✗]({{colors.error.default.hex}} bold)"

[container]
symbol = "  "

[deno]
symbol = "  "

[directory]
format = "[$path ](color3)"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = false

[docker_context]
symbol = "  "

[git_branch]
symbol = "  "
format = "on [$symbol$branch ]($style)"

[git_commit]
tag_symbol = '  '

[git_status]
format = "([$all_status$ahead_behind]($style) )"

[golang]
symbol = "  "

[gcloud]
format = 'on [$symbol(\($region\))]($style)'

[kubernetes]
symbol = "󱃾  "

[lua]
symbol = "  "

[memory_usage]
symbol = "󰍛  "
threshold = 50

[nix_shell]
symbol = "  "

[nodejs]
symbol = "󰎙  "

[php]
symbol = "  "

[python]
symbol = "  "

[rust]
symbol = "󱘗  "
