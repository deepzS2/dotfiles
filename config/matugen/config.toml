[config]


[config.wallpaper]
set = true
command = "awww img --transition-type center {{ image }}"

[templates.btop]
input_path = './templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

[templates.kitty]
input_path = './templates/kitty-colors.conf'
output_path = '~/.config/kitty/themes/Matugen.conf'
post_hook = "kitty +kitten themes --reload-in=all --config-file-name=themes.conf Matugen"

[templates.hyprland]
input_path = './templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.mako]
input_path = './templates/mako'
output_path = '~/.config/mako/mako-colors'
post_hook = 'makoctl reload'

[templates.mango]
input_path = './templates/mango-colors.conf'
output_path = '~/.config/mango/colors.conf'
post_hook = 'bash -c "if command -v mmsg >/dev/null 2>&1; then mmsg -d reload_config; fi"'

[templates.niri]
input_path = './templates/niri-colors.kdl'
output_path = '~/.config/niri/colors.kdl'
post_hook = 'bash -c "if command -v niri >/dev/null 2>&1; then niri msg action load-config-file; fi"'

[templates.quickshell]
input_path = './templates/quickshell-colors.json'
output_path = '~/.config/sheez/colors.json'

[templates.rofi]
input_path = './templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.starship]
input_path = './templates/starship-colors.toml'
output_path = '~/.config/starship.toml'

[templates.tmux]
input_path = './templates/tmux-colors.conf'
output_path = '~/.config/tmux/colors-generated.conf'
post_hook = 'tmux source-file ~/.config/tmux/colors-generated.conf'

[templates.yazi]
input_path = './templates/yazi-colors.toml'
output_path = '~/.config/yazi/theme.toml'
